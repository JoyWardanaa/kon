<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Fake Numbers & SMS - Multi Negara</title>
    <style>
        body { font-family: monospace; margin: 20px; background: #111; color: #0f0; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .country-card { border: 1px solid #0f0; padding: 10px; margin: 10px 0; background: #1a1a1a; width: 300px; }
        .number-item { background: #222; margin: 5px; padding: 5px; cursor: pointer; }
        .number-item:hover { background: #333; }
        .messages { border: 1px solid #0f0; height: 400px; overflow-y: scroll; padding: 10px; width: 500px; }
        .msg { border-bottom: 1px solid #333; margin: 5px 0; }
        .active { background: #2a4a2a; }
        button { background: #0a0; color: #000; border: none; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
<h2>Fake Numbers & SMS - Multi Negara (DEMO)</h2>
<div class="container">
    <div id="numbersPanel"></div>
    <div class="messages" id="smsBox">
        <div class="msg">[sistem] Pilih nomor untuk melihat SMS</div>
    </div>
</div>
<script>
    // DATA NEGARA + 3 NOMOR PALSU PER NEGARA
    const countries = [
        { name: "Indonesia", code: "+62", prefix: "812", numbers: ["81212345678", "81287654321", "81399887766"] },
        { name: "USA", code: "+1", prefix: "212", numbers: ["2125551234", "2125555678", "2125559999"] },
        { name: "Russia", code: "+7", prefix: "900", numbers: ["9001234567", "9007654321", "9001112233"] },
        { name: "Germany", code: "+49", prefix: "151", numbers: ["15112345678", "15187654321", "15199887766"] },
        { name: "UK", code: "+44", prefix: "7700", numbers: ["7700123456", "7700654321", "7700998877"] },
        { name: "India", code: "+91", prefix: "98765", numbers: ["9876543210", "9876501234", "9876598765"] },
        { name: "Brazil", code: "+55", prefix: "119", numbers: ["11912345678", "11987654321", "11999887766"] },
        { name: "Japan", code: "+81", prefix: "901", numbers: ["9012345678", "9018765432", "9011122334"] },
        { name: "Australia", code: "+61", prefix: "412", numbers: ["412123456", "412654321", "412998877"] },
        { name: "France", code: "+33", prefix: "612", numbers: ["612123456", "612654321", "612998877"] }
    ];

    let activeNumber = null;
    let activeCountry = null;
    let activeIndex = null;

    // Storage SMS per nomor
    let smsStorage = {};

    const smsContainer = document.getElementById('smsBox');
    const numbersPanel = document.getElementById('numbersPanel');

    function addMessage(numberKey, text, isIncoming = true) {
        if (!smsStorage[numberKey]) smsStorage[numberKey] = [];
        const timestamp = new Date().toLocaleTimeString();
        const msgObj = { time: timestamp, text: text, incoming: isIncoming };
        smsStorage[numberKey].push(msgObj);
        // Jika nomor aktif, refresh tampilan
        if (activeNumber === numberKey) {
            renderMessagesForActive();
        }
    }

    function renderMessagesForActive() {
        smsContainer.innerHTML = '';
        if (!activeNumber || !smsStorage[activeNumber] || smsStorage[activeNumber].length === 0) {
            smsContainer.innerHTML = '<div class="msg">[sistem] Belum ada SMS masuk. Kirim OTP ke nomor ini (DEMO).</div>';
            return;
        }
        smsStorage[activeNumber].forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerText = `[${msg.time}] ${msg.incoming ? '📩 MASUK' : '📤 KELUAR'} : ${msg.text}`;
            smsContainer.appendChild(msgDiv);
        });
        smsContainer.scrollTop = smsContainer.scrollHeight;
    }

    function generateFakeOTP() {
        return Math.floor(100000 + Math.random() * 900000);
    }

    // Simulasi OTP masuk ke nomor tertentu (dipanggil manual atau otomatis)
    function simulateIncomingSMS(numberKey) {
        const otp = generateFakeOTP();
        const msgText = `Kode OTP Anda: ${otp}. Jangan berikan ke siapa pun.`;
        addMessage(numberKey, msgText, true);
    }

    // Auto-simulasi setiap 12 detik untuk nomor aktif (jika ada)
    setInterval(() => {
        if (activeNumber) {
            simulateIncomingSMS(activeNumber);
        }
    }, 12000);

    // Render semua negara dan nomor
    function renderAllNumbers() {
        numbersPanel.innerHTML = '';
        countries.forEach((country, cIdx) => {
            const card = document.createElement('div');
            card.className = 'country-card';
            card.innerHTML = `<strong>${country.name} (${country.code})</strong>`;
            country.numbers.forEach((num, nIdx) => {
                const fullNumber = `${country.code} ${num}`;
                const numberKey = `${country.code}_${num}`;
                const numDiv = document.createElement('div');
                numDiv.className = 'number-item';
                numDiv.innerText = fullNumber;
                numDiv.onclick = () => {
                    // Hapus highlight sebelumnya
                    document.querySelectorAll('.number-item').forEach(el => el.classList.remove('active'));
                    numDiv.classList.add('active');
                    activeNumber = numberKey;
                    activeCountry = country.name;
                    activeIndex = nIdx;
                    renderMessagesForActive();
                    // Tambahkan pesan sistem
                    const sysMsg = `[sistem] Sekarang menggunakan: ${fullNumber}`;
                    addMessage(activeNumber, sysMsg, false);
                };
                card.appendChild(numDiv);
            });
            numbersPanel.appendChild(card);
        });
    }

    // Inisialisasi storage kosong untuk setiap nomor
    function initStorage() {
        countries.forEach(country => {
            country.numbers.forEach(num => {
                const key = `${country.code}_${num}`;
                if (!smsStorage[key]) smsStorage[key] = [];
                // Tambahkan pesan selamat datang
                smsStorage[key].push({ time: new Date().toLocaleTimeString(), text: `Nomor siap menerima SMS (DEMO). Kirim OTP ke ${country.code} ${num}`, incoming: false });
            });
        });
    }

    initStorage();
    renderAllNumbers();

    // Tombol manual untuk test OTP
    const testBtn = document.createElement('button');
    testBtn.innerText = '🔁 Kirim OTP Uji ke Nomor Aktif';
    testBtn.style.margin = '10px';
    testBtn.onclick = () => {
        if (activeNumber) simulateIncomingSMS(activeNumber);
        else alert('Pilih nomor dulu');
    };
    document.body.appendChild(testBtn);

    const info = document.createElement('p');
    info.style.color = '#aaa';
    info.innerText = '⚠️ DEMO: Penerimaan SMS asli TIDAK berfungsi tanpa gateway nyata (Twilio, sms-activate.org, dll). Ini hanya simulasi antarmuka.';
    document.body.appendChild(info);
</script>
</body>
</html>
