<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JoyWardana | Roblox Script Hub - RGB Theme</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;font-family:'Inter','Outfit',sans-serif;position:relative;overflow-x:hidden}
    .video-background{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(0.7) contrast(1.1) saturate(1.2)}
    .rgb-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 50%,rgba(173,216,230,0.12),rgba(255,182,193,0.08));z-index:-1;pointer-events:none;animation:rgbShift 12s infinite alternate}
    @keyframes rgbShift{0%{background:radial-gradient(circle at 30% 50%,rgba(173,216,230,0.15),rgba(255,182,193,0.05),rgba(135,206,250,0.1))}50%{background:radial-gradient(circle at 70% 60%,rgba(255,182,193,0.15),rgba(173,216,230,0.08),rgba(255,105,180,0.08))}100%{background:radial-gradient(circle at 20% 80%,rgba(135,206,250,0.18),rgba(255,182,193,0.1),rgba(173,216,230,0.12))}}
    .parent{display:grid;grid-template-columns:repeat(12,1fr);gap:1rem;width:100%;max-width:1400px;background:transparent;margin:0 auto;position:relative;z-index:5}
    
    /* Navbar - transparan, tanpa blur, hanya pinggiran RGB */
    .navbar{grid-column:2/12;position:sticky;top:1rem;z-index:100;background:rgba(0,0,0,0.35);border-radius:60px;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.8rem;flex-wrap:wrap;position:relative}
    .navbar::before{content:'';position:absolute;inset:0;border-radius:60px;padding:1.8px;background:linear-gradient(125deg,#89CFF0,#FFB6C1,#87CEEB);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
    
    .nav-brand{display:flex;align-items:center;gap:10px}
    .brand-icon{background:rgba(0,0,0,0.4);width:38px;height:38px;border-radius:30px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .brand-icon img{width:100%;height:100%;object-fit:cover}
    .brand-icon i{font-size:1.2rem;color:#FFB6C1}
    .brand-text{font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,#89CFF0,#FFB6C1,#87CEEB);background-clip:text;-webkit-background-clip:text;color:transparent}
    
    .nav-menu{display:flex;gap:0.3rem;background:transparent;padding:0;border-radius:100px;flex-wrap:wrap;justify-content:center}
    .menu-item{background:transparent;border:none;padding:0.45rem 1.5rem;font-size:0.85rem;font-weight:600;border-radius:60px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:#d1d5f0;transition:all 0.2s ease}
    .menu-item i{font-size:0.8rem}
    .menu-item:hover{background:rgba(135,206,250,0.3);color:#fff;transform:translateY(-1px)}
    .menu-item.active{background:linear-gradient(115deg,#FFB6C1,#89CFF0);color:white;box-shadow:0 2px 10px rgba(137,207,240,0.4)}
    
    .status-badge{background:rgba(0,0,0,0.4);padding:4px 12px;border-radius:50px;font-size:0.7rem;font-weight:500;color:#b9ffd6;border:1px solid rgba(173,216,230,0.4)}
    
    .hero-section{grid-column:2/12;display:flex;flex-direction:column;align-items:center;text-align:center;padding:1rem;width:100%;transition:opacity 0.25s ease,transform 0.25s ease;opacity:1;transform:translateY(0)}
    .fade-out{opacity:0;transform:translateY(8px)}
    
    .search-container{width:100%;max-width:550px;margin:1rem auto 1rem auto;position:relative;border-radius:60px}
    .search-container::before{content:'';position:absolute;inset:0;border-radius:60px;padding:1.5px;background:linear-gradient(125deg,#89CFF0,#FFB6C1);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
    .search-wrapper{display:flex;align-items:center;background:rgba(0,0,0,0.35);border-radius:60px;padding:0.15rem 1.2rem}
    .search-wrapper i{color:#FFB6C1;margin-right:10px;font-size:1rem}
    .search-input{flex:1;background:transparent;border:none;padding:0.75rem 0;font-size:0.9rem;color:#f0f3ff;outline:none}
    .search-input::placeholder{color:#8e93aa;font-size:0.85rem}
    .search-icon{color:#FFB6C1;font-size:1rem;margin-right:0.8rem}
    
    .hero-title{font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,#89CFF0,#FFB6C1,#87CEEB);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:0.3rem}
    .hero-description{max-width:750px;background:rgba(0,0,0,0.25);border-radius:28px;padding:1.2rem 1.8rem;border:1px solid rgba(173,216,230,0.3);margin-top:1.2rem}
    .hero-description p{font-size:0.95rem;line-height:1.5;color:#cbd5e6}
    
    .back-button{background:linear-gradient(95deg,#FFB6C1,#89CFF0);border:none;padding:8px 18px;border-radius:40px;color:white;font-weight:600;margin-bottom:1.2rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:0.85rem}
    .auto-timer{margin-left:10px;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:40px;font-size:0.75rem;color:#FFB6C1}
    
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem;width:100%;margin-top:1rem}
    .card{border-radius:20px;background:rgba(0,0,0,0.3);border:1px solid rgba(173,216,230,0.4);transition:all 0.2s ease;overflow:hidden}
    .card:hover{transform:translateY(-3px);border-color:#FFB6C1;box-shadow:0 15px 25px -10px rgba(255,182,193,0.3);background:rgba(0,0,0,0.45)}
    .card-inner{display:flex;align-items:center;gap:1rem;padding:0.9rem 1rem;cursor:pointer}
    .card-inner img{width:70px;height:70px;object-fit:cover;border-radius:12px;background:#0f1119;border:1px solid rgba(255,182,193,0.5);flex-shrink:0}
    .card-inner div{font-weight:600;font-size:0.9rem;color:#eef3ff;text-align:left;flex:1}
    .card-inner i{font-size:1.1rem;color:#89CFF0;flex-shrink:0}
    
    .empty-state{color:#ffb3c6;background:rgba(0,0,0,0.3);padding:1.8rem;border-radius:24px;text-align:center;border:1px solid #FFB6C1;font-size:0.9rem}
    .countdown-container{text-align:center;max-width:450px;margin:0 auto;background:rgba(0,0,0,0.7);padding:1.8rem;border-radius:28px;border:1px solid rgba(173,216,230,0.5)}
    .countdown-img{width:100%;max-width:240px;border-radius:12px;margin-bottom:15px;border:2px solid #FFB6C1}
    .btn-get{background:linear-gradient(95deg,#FFB6C1,#89CFF0);border:none;padding:10px 22px;border-radius:60px;color:white;font-weight:bold;font-size:0.9rem;cursor:pointer;margin-top:0.8rem}
    
    /* RESPONSIVE HP */
    @media (max-width: 850px) {
      .navbar{flex-direction:column;gap:0.6rem;padding:0.7rem 1rem;border-radius:45px;background:rgba(0,0,0,0.3)}
      .nav-menu{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;background:transparent;padding:0;border-radius:0}
      .menu-item{justify-content:center;padding:0.5rem 0.8rem;width:100%;background:transparent;border-radius:45px;font-size:0.8rem}
      .menu-item i{font-size:0.75rem}
      .menu-item:hover{background:rgba(135,206,250,0.3)}
      .nav-brand{order:1}
      .nav-menu{order:2}
      .nav-extra{order:3}
      .hero-title{font-size:2rem}
      .card-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}
      .card-inner img{width:60px;height:60px}
      .hero-description{padding:1rem;margin-top:1rem}
      .hero-description p{font-size:0.85rem}
    }
    @media (max-width: 600px){
      .hero-title{font-size:1.8rem}
      .card-inner img{width:55px;height:55px}
      .card-inner{padding:0.7rem;gap:0.7rem}
      .card-inner div{font-size:0.8rem}
      .navbar{background:rgba(0,0,0,0.25)}
      .menu-item{padding:0.45rem 0.5rem}
    }
    @media (max-width: 480px){.card-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<video class="video-background" autoplay loop muted playsinline><source src="bg.mp4" type="video/mp4"></video>
<div class="rgb-overlay"></div>
<div class="parent">
  <div class="navbar">
    <div class="nav-brand">
      <div class="brand-icon">
        <img src="fav.png" alt="JoyWardana Icon" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-crown\'></i>';">
      </div>
      <div class="brand-text">JoyWardana</div>
    </div>
    <div class="nav-menu">
      <button class="menu-item" data-menu="home"><i class="fas fa-home"></i> Home</button>
      <button class="menu-item" data-menu="script"><i class="fas fa-scroll"></i> Script</button>
      <button class="menu-item" data-menu="executor"><i class="fas fa-bolt"></i> Executor</button>
      <button class="menu-item" data-menu="discord"><i class="fab fa-discord"></i> Discord</button>
    </div>
    <div class="nav-extra"><div class="status-badge"><i class="fas fa-circle" style="font-size:0.45rem;color:#3aff8e;margin-right:5px;"></i> Online</div></div>
  </div>
  <div class="hero-section" id="dynamicContent"></div>
</div>

<script>
// ======================= DATA =======================
const scriptData = [
    { name: "VIOLENCE DISTRICT SCRIPT", img: "https://i.imgur.com/ViqmGiG.png", children: [
      { name: "Lynxx Hub - No Keys", img: "https://i.imgur.com/076ySi5.png", link: "https://linkunlocker.com/57eiB" },
      { name: "JX Hub - Keyless", img: "https://i.imgur.com/DI5EUJI.jpeg", link: "https://linkunlocker.com/fSEB4" },
      { name: "Ziaan Hub - Keyless", img: "https://i.imgur.com/lnFN0aw.jpeg", link: "https://linkunlocker.com/HKG9X" }
    ]},
    { name: "KICK A LUCKY BLOCK", img: "https://i.imgur.com/BKAIID1.png", children: [
      { name: "Cyraa Hub - No Keys", img: "https://i.imgur.com/5fZJFcy.jpeg", link: "https://linkunlocker.com/yqHrY" },
      { name: "Gluttony Hub - Keyless", img: "https://i.imgur.com/UvXSWms.png", link: "https://linkunlocker.com/Xvvui" },
      { name: "Rey Hub - Keyless", img: "https://i.imgur.com/UvXSWms.png", link: "https://linkunlocker.com/P492A" }
    ]},
    { name: "EVADE", img: "https://i.imgur.com/jSQarcS.png", children: [
      { name: "OPNSRC - No Keys", img: "https://i.imgur.com/w176s9T.png", link: "https://linkunlocker.com/XiQpH" },
      { name: "Honey Hub - No Keys", img: "https://i.imgur.com/w176s9T.png", link: "https://linkunlocker.com/WAwVl" }
    ]},
    { name: "BAKE OR DIE", img: "https://i.imgur.com/plwS8pO.png", children: [
      { name: "? BOD - Keyless", img: "https://i.imgur.com/OaWU1iY.png", link: "https://linkunlocker.com/9n7Ex" },
      { name: "Chiyo Hub - Keyless", img: "https://i.imgur.com/OaWU1iY.png", link: "https://linkunlocker.com/Q6mNw" }
    ]},
    { name: "SURVIVE THE APOCALYPSE", img: "https://i.imgur.com/NQkaC1k.png", children: [
      { name: "SPYMM - No Keys", img: "https://i.imgur.com/cJL3Dd0.png", link: "https://linkunlocker.com/jPyaW" },
      { name: "Yoshin Test - No Keys", img: "https://i.imgur.com/pRj7juk.png", link: "https://linkunlocker.com/Pvuzy" }
    ]},
    { name: "SAILOR PIECE SCRIPT", img: "https://i.imgur.com/rH7yhMV.jpeg", children: [
      { name: "Mola Hub - No Keys", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://linkunlocker.com/oQxwE" },
      { name: "Vora Hub - No Keys", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://linkunlocker.com/0w8ks" },
      { name: "Void Hub - No Keys", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://linkunlocker.com/8XlHL" }
    ]}
  ];
const executorData = [
  { name: "DELTA ANDROID VERSION", img: "https://i.imgur.com/1rKsOA2.jpeg", children: [
    { name: "DELTA VERSI 2.717", img: "https://i.imgur.com/1rKsOA2.jpeg", link: "https://sub2unlock.io/FuYfC" }
  ]}
];

// ======================= i18n AUTO TRANSLATE =======================
const translations = {
  en: { home: "Home", script: "Script", executor: "Executor", discord: "Discord", online: "Online", back_home: "Back to Home", back_list: "Back to List", auto: "Auto back in", sec: "s", search: "Search script...", desc: "The best place to find the latest Roblox scripts. Support PC & Mobile, fast updates, anti-crash. Access Sailor Piece, Violence District, Delta Executor, and more.", no_data: "No data available.", no_script: "No script in this category.", join: "Join our Discord", redirect: "Redirecting to link in", cancel: "Cancel", not_found: "No matching script found.", wait: "Wait", seconds: "seconds", next: "Next" },
  id: { home: "Home", script: "Script", executor: "Executor", discord: "Discord", online: "Online", back_home: "Kembali ke Home", back_list: "Kembali ke Daftar", auto: "Kembali otomatis dalam", sec: "dtk", search: "Cari script...", desc: "Tempat terbaik untuk menemukan script Roblox terbaru. Support PC & Mobile, update cepat, dan anti crash. Akses script Sailor Piece, Violence District, Delta Executor, dan lainnya.", no_data: "Belum ada data.", no_script: "Tidak ada script dalam kategori ini.", join: "Bergabung dengan Discord Kami", redirect: "Mengarahkan ke link dalam", cancel: "Batal", not_found: "Tidak ditemukan script yang cocok.", wait: "Tunggu", seconds: "detik", next: "Lanjut" }
};
let currentLang = "en";
function detectLang() { let l = navigator.language.slice(0,2).toLowerCase(); if(l === "id") currentLang = "id"; else currentLang = "en"; }
function __(key) { return translations[currentLang]?.[key] || translations.en[key] || key; }
detectLang();

// ======================= GLOBAL =======================
let currentView = "home", currentMenu = "home", autoBackTimer = null;
const contentDiv = document.getElementById("dynamicContent");
function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
function transitionTo(newRenderFn) { if(autoBackTimer) clearTimeout(autoBackTimer); contentDiv.classList.add("fade-out"); setTimeout(() => { newRenderFn(); contentDiv.classList.remove("fade-out"); }, 200); }

function performSearch(keyword, resultArea) {
  const trimmed = keyword.toLowerCase().trim();
  if(trimmed.length < 2) { resultArea.innerHTML = ''; return; }
  let results = [];
  const searchInArray = (dataArray) => {
    dataArray.forEach(category => {
      if(category.name.toLowerCase().includes(trimmed)) results.push({ type: "category", data: category });
      category.children.forEach(child => { if(child.name.toLowerCase().includes(trimmed)) results.push({ type: "child", data: child }); });
    });
  };
  searchInArray(scriptData); searchInArray(executorData);
  if(results.length === 0) { resultArea.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i> ${__("not_found")}</div>`; return; }
  let cardsHtml = `<div class="card-grid">`;
  results.forEach(res => {
    if(res.type === "category") {
      const cat = res.data;
      cardsHtml += `<div class="card"><div class="card-inner" onclick='renderDetailFromCategory(${JSON.stringify(cat)})'><img src="${cat.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(cat.name)}</div><i class="fas fa-chevron-right"></i></div></div>`;
    } else {
      const child = res.data;
      cardsHtml += `<div class="card"><div class="card-inner" onclick='openLinkWithTimer(${JSON.stringify(child)})'><img src="${child.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(child.name)}</div><i class="fas fa-download"></i></div></div>`;
    }
  });
  cardsHtml += `</div>`;
  resultArea.innerHTML = cardsHtml;
}

function renderHome() {
  currentView = "home";
  contentDiv.innerHTML = `
    <div class="hero-title">JoyWardana</div>
    <div class="search-container">
      <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" class="search-input" id="globalSearchInput" placeholder="${__("search")}" autocomplete="off">
      </div>
    </div>
    <div id="searchResultArea" style="width:100%;"></div>
    <div class="hero-description">
      <p>${__("desc")}</p>
    </div>
  `;
  const searchInput = document.getElementById("globalSearchInput");
  const resultArea = document.getElementById("searchResultArea");
  if(searchInput) searchInput.addEventListener("input", (e) => performSearch(e.target.value, resultArea));
  if(resultArea) resultArea.innerHTML = '';
}

function renderCategoryList(data) {
  currentView = "list";
  if(!data.length) { contentDiv.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i> ${__("no_data")}</div>`; return; }
  let html = `<div style="width:100%; text-align:left;"><button class="back-button" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> ${__("back_home")}</button></div><div class="card-grid">`;
  data.forEach(cat => { html += `<div class="card"><div class="card-inner" onclick='renderDetailFromCategory(${JSON.stringify(cat)})'><img src="${cat.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(cat.name)}</div><i class="fas fa-folder-open"></i></div></div>`; });
  html += `</div>`;
  contentDiv.innerHTML = html;
  const backBtn = document.getElementById("backToHomeBtn");
  if(backBtn) backBtn.addEventListener("click", () => transitionTo(renderHome));
}

window.renderDetailFromCategory = function(category) {
  if(autoBackTimer) clearTimeout(autoBackTimer);
  currentView = "detail";
  if(!category.children?.length) {
    contentDiv.innerHTML = `<div style="width:100%; text-align:left;"><button class="back-button" id="backToHomeFromEmpty"><i class="fas fa-arrow-left"></i> ${__("back_home")}</button></div><div class="empty-state"><i class="fas fa-exclamation-triangle"></i> ${__("no_script")}</div>`;
    const backBtn = document.getElementById("backToHomeFromEmpty");
    if(backBtn) backBtn.addEventListener("click", () => transitionTo(renderHome));
    return;
  }
  let html = `<div style="width:100%; text-align:left; display:flex; align-items:center; flex-wrap:wrap; gap:12px;">
                <button class="back-button" id="backToListBtn"><i class="fas fa-arrow-left"></i> ${__("back_list")}</button>
                <span class="auto-timer"><i class="fas fa-hourglass-half"></i> ${__("auto")} <span id="countdownSec">60</span> ${__("sec")}</span>
              </div>
              <div class="card-grid">`;
  category.children.forEach(child => {
    html += `<div class="card"><div class="card-inner" onclick='openLinkWithTimer(${JSON.stringify(child)})'><img src="${child.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(child.name)}</div><i class="fas fa-download"></i></div></div>`;
  });
  html += `</div>`;
  contentDiv.innerHTML = html;
  
  let count = 60;
  const countSpan = document.getElementById("countdownSec");
  const interval = setInterval(() => { count--; if(countSpan) countSpan.innerText = count; if(count <= 0) { clearInterval(interval); if(currentView === "detail") transitionTo(() => renderCategoryList(currentMenu === "script" ? scriptData : executorData)); } }, 1000);
  autoBackTimer = setTimeout(() => {}, 60000);
  const backBtn = document.getElementById("backToListBtn");
  if(backBtn) backBtn.addEventListener("click", () => { clearInterval(interval); transitionTo(() => renderCategoryList(currentMenu === "script" ? scriptData : executorData)); });
};

window.openLinkWithTimer = function(item) {
  let remaining = 10;
  const overlayDiv = document.createElement('div');
  overlayDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;';
  overlayDiv.innerHTML = `
    <div class="countdown-container">
      <img src="${item.img}" class="countdown-img" onerror="this.src='https://i.imgur.com/placeholder.png'">
      <h3 style="color:white;font-size:1.1rem;">${escapeHtml(item.name)}</h3>
      <button class="btn-get" id="countdownBtn"><i class="fas fa-hourglass-half"></i> ${__("wait")} ${remaining} ${__("seconds")}</button>
    </div>
  `;
  document.body.appendChild(overlayDiv);
  const btn = overlayDiv.querySelector("#countdownBtn");
  const interval = setInterval(() => {
    remaining--;
    if(btn) btn.innerHTML = `<i class="fas fa-hourglass-half"></i> ${__("wait")} ${remaining} ${__("seconds")}`;
    if(remaining <= 0) {
      clearInterval(interval);
      if(btn) {
        btn.innerHTML = `<i class="fas fa-arrow-right"></i> ${__("next")}`;
        btn.style.background = "linear-gradient(95deg, #4c8bff, #b86eff)";
        btn.onclick = () => { window.open(item.link, '_blank'); overlayDiv.remove(); };
      }
    }
  }, 1000);
};

function setActiveMenuButton(menuValue) {
  document.querySelectorAll(".menu-item").forEach(btn => {
    const val = btn.getAttribute("data-menu");
    if(val === menuValue) btn.classList.add("active");
    else btn.classList.remove("active");
  });
}

function navigateTo(menu) {
  currentMenu = menu;
  setActiveMenuButton(menu);
  if(menu === "home") transitionTo(renderHome);
  else if(menu === "script") transitionTo(() => renderCategoryList(scriptData));
  else if(menu === "executor") transitionTo(() => renderCategoryList(executorData));
  else if(menu === "discord") window.open("https://discord.gg/Yyn9FQJbhx", "_blank");
}

function updateMenuText() {
  const menus = ["home", "script", "executor", "discord"];
  const menuItems = document.querySelectorAll(".menu-item");
  menuItems.forEach((btn, idx) => {
    const spans = btn.querySelectorAll("span");
    if(spans.length === 0) {
      const textNode = btn.childNodes[btn.childNodes.length - 1];
      if(textNode && textNode.nodeType === 3) textNode.textContent = " " + __(menus[idx]);
    }
  });
  const statusSpan = document.querySelector(".status-badge");
  if(statusSpan) statusSpan.innerHTML = `<i class="fas fa-circle" style="font-size:0.45rem;color:#3aff8e;margin-right:5px;"></i> ${__("online")}`;
}
updateMenuText();

document.querySelectorAll(".menu-item").forEach(btn => {
  btn.addEventListener("click", () => navigateTo(btn.getAttribute("data-menu")));
});

window.renderDetailFromCategory = renderDetailFromCategory;
window.openLinkWithTimer = openLinkWithTimer;
navigateTo("home");
</script>
</body>
