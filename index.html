<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JoyWardana | Unlock Content</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;min-height:100vh;color:#fff}
.video-bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:brightness(0.35)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at center,rgba(0,0,0,0.5),rgba(0,0,0,0.85));z-index:-1}
.container{max-width:650px;margin:0 auto;padding:2rem 1.5rem 3rem;position:relative;z-index:10}
.profile{text-align:center;margin-bottom:1.8rem}
.avatar{width:90px;height:90px;background:linear-gradient(135deg,#ff416c,#ff4b2b);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2.8rem;box-shadow:0 10px 25px rgba(0,0,0,0.3)}
.username{font-size:1.6rem;font-weight:700;background:linear-gradient(120deg,#fff,#ffcc80);-webkit-background-clip:text;background-clip:text;color:transparent}
.handle{font-size:0.9rem;color:#bbb;margin-top:4px}
.progress-card{background:rgba(20,20,30,0.7);backdrop-filter:blur(12px);border-radius:28px;padding:1.5rem;margin-bottom:2rem;text-align:center;border:1px solid rgba(255,255,255,0.1)}
.steps-text{font-size:0.85rem;color:#ccc;margin-bottom:8px}
.steps-count{font-size:1.8rem;font-weight:800}
.steps-count span:first-child{color:#ffb347}
.progress-bar{background:#2c2c3a;border-radius:30px;height:10px;margin:15px 0;overflow:hidden}
.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#f7971e,#ffd200);transition:width 0.3s}
.unlock-btn{background:linear-gradient(95deg,#00c6fb,#005bea);border:none;padding:12px 20px;border-radius:60px;font-weight:bold;font-size:1.1rem;width:100%;cursor:pointer;color:white;margin-top:10px}
.unlock-btn.disabled{opacity:0.6;cursor:not-allowed}
.section-title{font-size:1.2rem;font-weight:600;margin:25px 0 15px;border-left:4px solid #ffb347;padding-left:15px}
.button-grid{display:grid;grid-template-columns:1fr;gap:12px}
.action-card{background:rgba(15,15,25,0.8);backdrop-filter:blur(10px);border-radius:20px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:0.2s;border:1px solid rgba(255,255,255,0.1)}
.action-card:hover{background:rgba(35,35,55,0.9);border-color:#ffaa44;transform:translateX(5px)}
.action-left{display:flex;align-items:center;gap:14px}
.action-left i{font-size:1.6rem;width:32px;color:#ffaa44}
.action-info h4{font-size:1rem;font-weight:600}
.action-info p{font-size:0.7rem;color:#aaa}
.check-circle{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center}
.check-circle.completed{background:#2ecc71;color:white}
.add-panel{background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);border-radius:24px;padding:1rem;margin-top:30px;border:1px solid rgba(255,215,0,0.3)}
.input-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.input-row input,.input-row select{flex:1;padding:10px 15px;border-radius:40px;border:none;background:#1e1e2a;color:white}
.input-row button{background:#ffb347;border:none;padding:0 20px;border-radius:40px;font-weight:bold;cursor:pointer}
.warning{font-size:0.7rem;color:#ffaa88;margin-top:8px}
.footer{text-align:center;font-size:0.7rem;margin-top:25px;color:#aaa}
@media (max-width:500px){.container{padding:1.2rem}}
</style>
</head>
<body>
<video class="video-bg" autoplay loop muted playsinline>
<source src="https://assets.mixkit.co/videos/preview/mixkit-digital-particles-flowing-in-the-dark-3283-large.mp4" type="video/mp4">
</video>
<div class="overlay"></div>
<div class="container">
<div class="profile">
<div class="avatar"><i class="fas fa-crown"></i></div>
<div class="username">JOY WARDANA</div>
<div class="handle">@JoyWardanaa</div>
</div>
<div class="progress-card">
<div class="steps-text">Clear every step below — then unlock.</div>
<div class="steps-count"><span id="completedCount">0</span> / <span id="totalCount">0</span> done</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<button id="unlockBtn" class="unlock-btn disabled">🔒 Locked • Complete steps</button>
<div style="font-size:0.7rem; margin-top:8px;">Best for creators with active traffic</div>
</div>
<div class="section-title"><i class="fas fa-list-check"></i> Complete actions</div>
<div id="buttonsContainer" class="button-grid"></div>
<div class="add-panel">
<div><i class="fas fa-plus-circle"></i> Tambah Button (Max 8)</div>
<div class="input-row">
<input type="text" id="newName" placeholder="Nama tombol" value="Subscribe Channel">
<select id="newIcon">
<option value="fab fa-youtube">🎬 YouTube</option>
<option value="fab fa-discord">🎮 Discord</option>
<option value="fas fa-thumbs-up">👍 Like</option>
<option value="fas fa-heart">❤️ Like+Comment</option>
<option value="fas fa-bell">🔔 Notify</option>
<option value="fab fa-twitter">🐦 Twitter</option>
</select>
<button id="addBtn">+ Tambah</button>
</div>
<div class="warning" id="maxWarning" style="display:none;">⚠️ Maksimal 8 button!</div>
<div class="warning">💡 Klik card = tandai selesai + buka link (jika ada)</div>
</div>
<div class="footer"><i class="fas fa-link"></i> Create your own link setelah semua selesai</div>
</div>
<script>
let buttons = [
{id:"b1",name:"Subscribe to Channel",icon:"fab fa-youtube",completed:false,url:"https://www.youtube.com/@JoyWardanaa?sub_confirmation=1"},
{id:"b2",name:"Like Video",icon:"fas fa-thumbs-up",completed:false,url:"#"},
{id:"b3",name:"Like & Comment",icon:"fas fa-comment-dots",completed:false,url:"#"},
{id:"b4",name:"Join Discord Server",icon:"fab fa-discord",completed:false,url:"https://discord.gg/example"},
{id:"b5",name:"Enable Notifications",icon:"fas fa-bell",completed:false,url:"#"},
{id:"b6",name:"Subscribe & Bell",icon:"fas fa-bell",completed:false,url:"https://www.youtube.com/@JoyWardanaa?sub_confirmation=1"}
];
const MAX=8;
function render(){const c=document.getElementById('buttonsContainer');if(!c)return;c.innerHTML='';buttons.forEach(btn=>{const card=document.createElement('div');card.className='action-card';card.setAttribute('data-id',btn.id);card.onclick=(e)=>{e.stopPropagation();toggleComplete(btn.id);};const left=document.createElement('div');left.className='action-left';const icon=document.createElement('i');icon.className=btn.icon;const info=document.createElement('div');info.className='action-info';info.innerHTML=`<h4>${btn.name}</h4><p>${btn.url!=='#'?'Klik verifikasi':'Tandai selesai'}</p>`;left.appendChild(icon);left.appendChild(info);const checkDiv=document.createElement('div');checkDiv.className='check-circle';if(btn.completed){checkDiv.classList.add('completed');checkDiv.innerHTML='<i class="fas fa-check"></i>';}else{checkDiv.innerHTML='<i class="far fa-circle"></i>';}card.appendChild(left);card.appendChild(checkDiv);c.appendChild(card);});updateProgress();}
function toggleComplete(id){const idx=buttons.findIndex(b=>b.id===id);if(idx===-1)return;buttons[idx].completed=!buttons[idx].completed;const btn=buttons[idx];if(btn.url&&btn.url!=="#"){window.open(btn.url,'_blank');}render();}
function updateProgress(){const total=buttons.length;const completed=buttons.filter(b=>b.completed).length;document.getElementById('completedCount').innerText=completed;document.getElementById('totalCount').innerText=total;const percent=total===0?0:(completed/total)*100;document.getElementById('progressFill').style.width=`${percent}%`;const unlockBtn=document.getElementById('unlockBtn');if(completed===total&&total>0){unlockBtn.classList.remove('disabled');unlockBtn.innerText='🔓 UNLOCK LINK → Create your own link';}else{unlockBtn.classList.add('disabled');unlockBtn.innerText='🔒 Locked • Complete all steps';}}
function addNewButton(){if(buttons.length>=MAX){const warn=document.getElementById('maxWarning');warn.style.display='block';setTimeout(()=>warn.style.display='none',2000);return;}const nameInput=document.getElementById('newName');const iconSelect=document.getElementById('newIcon');let newName=nameInput.value.trim();if(newName==="")newName="Action Item";const selectedIcon=iconSelect.value;let defaultUrl="#";if(selectedIcon.includes('youtube'))defaultUrl="https://www.youtube.com/@JoyWardanaa?sub_confirmation=1";else if(selectedIcon.includes('discord'))defaultUrl="https://discord.gg/invite/example";else if(selectedIcon.includes('twitter'))defaultUrl="https://twitter.com/JoyWardanaa";else defaultUrl="#";const newId="btn_"+Date.now()+"_"+Math.floor(Math.random()*999);buttons.push({id:newId,name:newName,icon:selectedIcon,completed:false,url:defaultUrl});render();nameInput.value="";document.getElementById('maxWarning').style.display='none';}
function handleUnlock(){const total=buttons.length;const completed=buttons.filter(b=>b.completed).length;if(completed===total&&total>0){const confirmUnlock=confirm("✅ Semua step selesai! Buat link kustommu?");if(confirmUnlock){let customLink=prompt("Masukkan URL tujuanmu (contoh: https://lynk.id/kamu):","https://s.id/linkkreator");if(customLink&&customLink.trim()!==""){if(!customLink.startsWith("http"))customLink="https://"+customLink;window.open(customLink,'_blank');alert("Link kustom terbuka! Selamat!");}else{alert("Link tidak valid, tapi kamu sudah menyelesaikan misi!");}}}else{alert(`Masih ada ${total-completed} aksi yang belum diselesaikan!`);}}
document.getElementById('unlockBtn').addEventListener('click',handleUnlock);
document.getElementById('addBtn').addEventListener('click',addNewButton);
render();
</script>
</body>
</html>
